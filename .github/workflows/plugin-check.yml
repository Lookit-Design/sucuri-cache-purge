name: Plugin Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: plugin-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin-check:
    name: WordPress.org Plugin Check
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 'latest'
          extensions: mysqli
          coverage: none
          tools: wp-cli

      - name: Build distributable copy
        run: |
          mkdir -p build/lookit-sucuri-cache-purge
          rsync -a --exclude-from=.distignore ./ build/lookit-sucuri-cache-purge/

      - name: Set up WordPress and Plugin Check
        run: |
          wp core download --path=wp --version=latest
          wp config create --path=wp --dbname=wp_pc --dbuser=root --dbpass=root --dbhost=127.0.0.1:3306
          wp db create --path=wp
          wp core install --path=wp --url=http://localhost --title="Plugin Check" \
            --admin_user=admin --admin_password=admin --admin_email=admin@example.com --skip-email
          cp -R build/lookit-sucuri-cache-purge wp/wp-content/plugins/lookit-sucuri-cache-purge
          wp plugin install plugin-check --activate --path=wp
          wp plugin activate lookit-sucuri-cache-purge --path=wp

      - name: Run Plugin Check
        run: |
          OUTPUT=$(wp plugin check lookit-sucuri-cache-purge --path=wp --include-experimental --severity=error 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "No errors found"; then
            echo "Plugin Check passed with no errors."
          else
            echo "::error::Plugin Check reported errors."
            exit 1
          fi
