name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: WP ${{ matrix.wp }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Every WordPress x PHP pair below is one the WordPress core team documents
      # as supported. Unsupported pairs are excluded so the matrix stays green.
      # WordPress 5.9 is the floor here because it is the earliest release whose
      # bundled test suite supports PHPUnit 9 (via the Yoast polyfills); 5.8 is
      # still supported at runtime but cannot be exercised by the modern toolchain.
      # Source: https://make.wordpress.org/core/handbook/references/php-compatibility-and-wordpress-versions/
      matrix:
        wp: ['5.9', '6.0', '6.1', '6.2', '6.3', '6.4', '6.5', '6.6', '6.7', '6.8', '6.9', '7.0']
        php: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
        exclude:
          - { wp: '5.9', php: '8.2' }
          - { wp: '5.9', php: '8.3' }
          - { wp: '5.9', php: '8.4' }
          - { wp: '5.9', php: '8.5' }
          - { wp: '6.0', php: '8.2' }
          - { wp: '6.0', php: '8.3' }
          - { wp: '6.0', php: '8.4' }
          - { wp: '6.0', php: '8.5' }
          - { wp: '6.1', php: '8.3' }
          - { wp: '6.1', php: '8.4' }
          - { wp: '6.1', php: '8.5' }
          - { wp: '6.2', php: '8.3' }
          - { wp: '6.2', php: '8.4' }
          - { wp: '6.2', php: '8.5' }
          - { wp: '6.3', php: '8.3' }
          - { wp: '6.3', php: '8.4' }
          - { wp: '6.3', php: '8.5' }
          - { wp: '6.4', php: '8.4' }
          - { wp: '6.4', php: '8.5' }
          - { wp: '6.5', php: '8.4' }
          - { wp: '6.5', php: '8.5' }
          - { wp: '6.6', php: '8.4' }
          - { wp: '6.6', php: '8.5' }
          - { wp: '6.7', php: '8.5' }
          - { wp: '6.8', php: '8.5' }

    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      WP_TESTS_PHPUNIT_POLYFILLS_PATH: ${{ github.workspace }}/vendor/yoast/phpunit-polyfills

    steps:
      - uses: actions/checkout@v4

      - name: Install Subversion
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli
          coverage: none
          tools: composer

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Install WordPress test suite
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1:3306 ${{ matrix.wp }}

      - name: Run PHPUnit
        run: vendor/bin/phpunit

      - name: Run PHPUnit (ajax group)
        run: vendor/bin/phpunit --group ajax

  # Single stable status check that summarises the whole matrix above, so
  # branch protection can require one name ("Test") instead of every cell.
  test-result:
    name: Test
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any matrix job did not succeed
        if: needs.test.result != 'success'
        run: exit 1
