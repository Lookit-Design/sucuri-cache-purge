name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: PHP lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: none

      - name: Lint all PHP files
        run: |
          find . -path ./vendor -prune -o -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l

  # Single stable status check that summarises the whole matrix above, so
  # branch protection can require one name ("Lint") instead of every cell.
  lint-result:
    name: Lint
    if: always()
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any matrix job did not succeed
        if: needs.lint.result != 'success'
        run: exit 1
