name: Coding Standards

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coding-standards-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coding-standards:
    name: Coding standards & security (PHPCS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 'latest'
          coverage: none
          tools: composer

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Run PHPCS (WordPress standards + PHP compatibility)
        run: composer phpcs
